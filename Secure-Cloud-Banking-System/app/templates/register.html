{% extends "layouts/auth_base.html" %}

{% block title %}Register - Secure Bank{% endblock %}

{% block content %}
<form class="auth-form" method="POST" action="{{ url_for('auth.register') }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="field">
    <label class="field-label">Full Name</label>
    <input class="input" type="text" name="full_name" placeholder="John Doe" required>
  </div>
  <div class="field">
    <label class="field-label">Email</label>
    <input class="input" type="email" name="email" placeholder="you@example.com" required>
  </div>
  <div class="field">
    <label class="field-label">Phone Number</label>
    <input class="input" type="text" name="phone" placeholder="+91 98765 43210" required>
  </div>
  <div class="field">
    <label class="field-label">Password</label>
    <input class="input" type="password" name="password" placeholder="••••••••" required>
  </div>
  <button class="btn-submit" type="submit">Create Account</button>
</form>
{% endblock %}

{% block auth_footer %}
<p class="m-0">Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
{% endblock %}
