{% extends "layouts/app_base.html" %}

{% block content %}

<div class="card">

<div class="panel-head withdraw">
<h2>Withdraw</h2>
<p>Withdraw funds from your account</p>
</div>

<div class="panel-body">

<div class="summary-box">
<div>Type</div>
<div>Withdraw</div>
</div>

<div class="summary-box">
<div>Amount</div>
<div>${{ amount }}</div>
</div>

<form method="POST" action="{{ url_for('transactions.withdraw_confirm') }}">

<input type="hidden" name="amount" value="{{ amount }}">

<button class="btn primary">
Confirm Withdraw
</button>

</form>

<a href="{{ url_for('transactions.withdraw') }}">Back</a>

</div>

</div>

{% endblock %}
