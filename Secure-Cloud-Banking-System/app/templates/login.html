{% extends "layouts/auth_base.html" %}

{% block title %}Login - Secure Bank{% endblock %}

{% block content %}
  <form class="auth-form" method="POST" action="{{ url_for('auth.login') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="field">
      <label class="field-label">Email</label>
      <input class="input" type="email" name="email" placeholder="you@example.com" required>
    </div>
    <div class="field">
      <label class="field-label">Password</label>
      <input class="input" type="password" name="password" placeholder="••••••••" required>
    </div>
    <button class="btn-submit" type="submit">Sign In</button>
  </form>
{% endblock %}

{% block auth_footer %}
  <p class="m-0">Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a></p>
  <hr>
  <p class="text-center m-0">
{% endblock %}
